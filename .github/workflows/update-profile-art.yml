name: update profile art

on:
  schedule:
    - cron: "17 4 * * *"   # daily at 04:17 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - ".github/workflows/update-profile-art.yml"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: install deps
        run: pip install -r scripts/requirements.txt

      - name: fetch contributions
        env:
          GH_PROFILE_USER: jyo-coded
        run: python scripts/fetch_contributions.py

      - name: render heatmap
        run: python scripts/render_heatmap_svg.py

      - name: commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/contributions.json contrib-heatmap.svg
          git diff --cached --quiet || git commit -m "chore: refresh contribution graph"
          git push
